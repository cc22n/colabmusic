{% extends "base.html" %}

{% block title %}Proyectos — ColabMusic{% endblock %}

{% block content %}
<div class="flex flex-col gap-8">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold text-white">Proyectos</h1>
      <p class="text-gray-400 text-sm mt-1">Explora colaboraciones abiertas y únete</p>
    </div>
    {% if user.is_authenticated %}
    <a href="{% url 'projects:create' %}"
       class="inline-flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white px-5 py-2.5 rounded-lg font-medium transition-colors text-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Nuevo proyecto
    </a>
    {% endif %}
  </div>

  <!-- Filters -->
  <div class="bg-gray-900 border border-gray-800 rounded-xl p-4"
       x-data="{ filtersOpen: false }">

    <!-- Search bar always visible -->
    <div class="flex gap-3">
      <input
        type="text"
        name="q"
        value="{{ current_filters.q }}"
        placeholder="Buscar proyectos..."
        class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 text-sm"
        hx-get="{% url 'projects:list' %}"
        hx-trigger="keyup changed delay:400ms"
        hx-target="#project-results"
        hx-include="[name='status'],[name='genre'],[name='type']"
        hx-push-url="true"
      />
      <button @click="filtersOpen = !filtersOpen"
              class="px-4 py-2 bg-gray-800 border border-gray-700 text-gray-300 hover:text-white rounded-lg text-sm transition-colors flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/>
        </svg>
        Filtros
      </button>
    </div>

    <!-- Collapsible filters -->
    <div x-show="filtersOpen" x-transition class="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-3">

      <select name="status"
              class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-purple-500"
              hx-get="{% url 'projects:list' %}"
              hx-trigger="change"
              hx-target="#project-results"
              hx-include="[name='q'],[name='genre'],[name='type']"
              hx-push-url="true">
        <option value="">Todos los estados</option>
        {% for value, label in status_choices %}
        <option value="{{ value }}" {% if current_filters.status == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>

      <select name="genre"
              class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-purple-500"
              hx-get="{% url 'projects:list' %}"
              hx-trigger="change"
              hx-target="#project-results"
              hx-include="[name='q'],[name='status'],[name='type']"
              hx-push-url="true">
        <option value="">Todos los géneros</option>
        {% for genre in genres %}
        <option value="{{ genre.slug }}" {% if current_filters.genre == genre.slug %}selected{% endif %}>{{ genre.name }}</option>
        {% endfor %}
      </select>

      <select name="type"
              class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-purple-500"
              hx-get="{% url 'projects:list' %}"
              hx-trigger="change"
              hx-target="#project-results"
              hx-include="[name='q'],[name='status'],[name='genre']"
              hx-push-url="true">
        <option value="">Todos los tipos</option>
        {% for value, label in type_choices %}
        <option value="{{ value }}" {% if current_filters.type == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>

    </div>
  </div>

  <!-- Project results (HTMX target) -->
  <div id="project-results"
       hx-indicator="#loading">
    {% include "projects/partials/project_list.html" %}
  </div>

  <!-- Loading indicator -->
  <div id="loading" class="htmx-indicator text-center py-4">
    <span class="text-gray-500 text-sm animate-pulse">Cargando...</span>
  </div>

</div>
{% endblock %}
